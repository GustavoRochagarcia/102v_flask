<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>102v Flask - Productos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            min-height: 100vh;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 0.8rem 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: #4fc3f7;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        td { font-size: 0.95rem; }
        .precio { color: #81c784; font-weight: 600; }
        .stock { color: #ffb74d; }
        .btn-eliminar {
            background: #e57373;
            color: #fff;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: none;
            transition: background 0.25s;
        }
        .btn-eliminar:hover { background: #f44336; }
        h2 {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
        }
        form {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 0.8rem;
            align-items: end;
        }
        label {
            font-size: 0.8rem;
            color: #b0bec5;
            margin-bottom: 0.3rem;
            display: block;
        }
        input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 0.95rem;
        }
        input:focus { outline: none; border-color: #4fc3f7; }
        .btn-agregar {
            background: #4fc3f7;
            color: #0f2027;
            font-weight: 700;
            border: none;
            padding: 0.65rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.25s;
            height: fit-content;
        }
        .btn-agregar:hover { background: #29b6f6; }
        .vacio {
            text-align: center;
            color: #78909c;
            padding: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Productos</h1>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    {% if productos %}
                        {% for p in productos %}
                        <tr>
                            <td>{{ p.id }}</td>
                            <td>{{ p.nombre }}</td>
                            <td class="precio">${{ "%.2f"|format(p.precio) }}</td>
                            <td class="stock">{{ p.stock }}</td>
                            <td>
                                <a href="{{ url_for('main.eliminar', id=p.id) }}" class="btn-eliminar">Eliminar</a>
                            </td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="5" class="vacio">No hay productos registrados</td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Agregar producto</h2>
            <form action="{{ url_for('main.agregar') }}" method="POST">
                <div>
                    <label>Nombre</label>
                    <input type="text" name="nombre" required>
                </div>
                <div>
                    <label>Precio</label>
                    <input type="number" name="precio" step="0.01" min="0" required>
                </div>
                <div>
                    <label>Stock</label>
                    <input type="number" name="stock" min="0" required>
                </div>
                <button type="submit" class="btn-agregar">Agregar</button>
            </form>
        </div>
    </div>
</body>
</html>
